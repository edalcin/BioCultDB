version: '3.8'

services:
  # BioCultDB Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: etnodb-app
    restart: unless-stopped
    environment:
      SQLITE_DB_PATH: /data/unidade.sqlite
      PORT_ACQUISITION: 3001
      PORT_CURATION: 3002
      PORT_PRESENTATION: 3003
      NODE_ENV: development
    ports:
      - "3001:3001"  # Acquisition context
      - "3002:3002"  # Curation context
      - "3003:3003"  # Presentation context
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - /app/node_modules
      - sqlite_data:/data
    networks:
      - etnodb-network
    command: npm run dev

volumes:
  sqlite_data:
    driver: local

networks:
  etnodb-network:
    driver: bridge
